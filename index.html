<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGULAR</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap');
:root {
  --bg:#080810;--bg2:#0e0e1a;
  --core:#a78bfa;--text:#e2e0f0;--text-muted:#6b6880;--text-dim:#3a3850;
  --border:rgba(167,139,250,0.12);--border-bright:rgba(167,139,250,0.3);
  --panel:rgba(8,8,16,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100vh;overflow:hidden;}

#boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;transition:opacity .8s ease,transform .8s ease;}
#boot.fade-out{opacity:0;transform:scale(1.04);pointer-events:none;}
.boot-logo{font-family:'DM Serif Display',serif;font-size:3.5rem;letter-spacing:.3em;opacity:.9;margin-bottom:.25rem;}
.boot-sub{font-size:.6rem;letter-spacing:.4em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3.5rem;}
.boot-card{background:var(--bg2);border:.5px solid var(--border-bright);border-radius:12px;padding:2rem 2.5rem;width:340px;text-align:center;}
.boot-card-title{font-size:.65rem;letter-spacing:.25em;color:var(--text-muted);text-transform:uppercase;margin-bottom:1.5rem;}
.btn-google{width:100%;padding:.85rem 1.25rem;background:transparent;border:.5px solid var(--border-bright);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:background .2s,border-color .2s;margin-bottom:.75rem;}
.btn-google:hover{background:rgba(167,139,250,.07);border-color:var(--core);}
.btn-google svg{width:16px;height:16px;flex-shrink:0;}
.btn-local{width:100%;padding:.7rem 1.25rem;background:transparent;border:.5px solid var(--text-dim);border-radius:8px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;cursor:pointer;transition:color .2s,border-color .2s;}
.btn-local:hover{color:var(--text);border-color:var(--text-muted);}
.boot-note{font-size:.6rem;color:var(--text-dim);margin-top:1.25rem;line-height:1.7;}
.boot-reconnect{margin-top:1rem;font-size:.62rem;color:#34d399;letter-spacing:.1em;cursor:pointer;text-decoration:underline;display:none;}

#universe{position:fixed;inset:0;opacity:0;transition:opacity 1s ease;pointer-events:none;}
#universe.active{opacity:1;pointer-events:all;}

#canvas{position:absolute;inset:0;cursor:grab;}
#canvas.grabbing{cursor:grabbing;}

#status{position:fixed;top:1.5rem;left:1.5rem;display:flex;align-items:center;gap:.5rem;font-size:.6rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;z-index:20;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.status-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399;}

#topright{position:fixed;top:1.5rem;right:1.5rem;text-align:right;font-size:.6rem;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;line-height:1.9;z-index:20;}

#hint{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);font-size:.62rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;transition:opacity .5s;white-space:nowrap;pointer-events:none;z-index:20;}

#input-bar{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);width:min(600px,85vw);display:flex;align-items:center;background:var(--bg2);border:.5px solid var(--border-bright);border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(167,139,250,.08);z-index:20;}
#input-field{flex:1;padding:1rem 1.25rem;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.03em;}
#input-field::placeholder{color:var(--text-muted);}
#input-send{padding:.75rem 1.25rem;background:transparent;border:none;border-left:.5px solid var(--border);color:var(--core);cursor:pointer;font-size:1rem;transition:background .2s;}
#input-send:hover{background:rgba(167,139,250,.1);}

#zoom-controls{position:fixed;bottom:2.5rem;right:1.5rem;display:flex;flex-direction:column;gap:.4rem;z-index:20;}
.zoom-btn{width:32px;height:32px;background:var(--bg2);border:.5px solid var(--border-bright);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:color .2s;}
.zoom-btn:hover{color:var(--text);}

#panel{position:fixed;top:50%;right:-380px;transform:translateY(-50%);width:320px;max-height:76vh;background:var(--panel);border:.5px solid var(--border-bright);border-radius:12px;padding:1.5rem;transition:right .4s cubic-bezier(.16,1,.3,1);overflow-y:auto;z-index:50;backdrop-filter:blur(24px);}
#panel.open{right:1.5rem;}
.panel-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:.9rem;font-family:'DM Mono',monospace;}
.panel-close:hover{color:var(--text);}
.panel-badge{display:inline-block;font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;padding:.22rem .55rem;border-radius:4px;margin-bottom:.75rem;}
.panel-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);margin-bottom:.5rem;line-height:1.5;}
.panel-meta{font-size:.55rem;color:var(--text-dim);margin-bottom:1rem;}
.panel-section{margin-bottom:.85rem;}
.panel-section-label{font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.35rem;}
.panel-section-body{font-size:.66rem;color:var(--text-muted);line-height:1.7;}
.panel-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.35rem;}
.panel-tag{font-size:.56rem;padding:.18rem .5rem;border:.5px solid rgba(245,158,11,.3);border-radius:4px;color:#f59e0b;cursor:pointer;}
.panel-relations{display:flex;flex-direction:column;gap:.3rem;margin-top:.35rem;}
.panel-rel{font-size:.6rem;padding:.3rem .6rem;background:rgba(52,211,153,.04);border:.5px solid rgba(52,211,153,.15);border-radius:6px;color:var(--text-muted);cursor:pointer;transition:background .2s;}
.panel-rel:hover{background:rgba(52,211,153,.1);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="boot">
  <div class="boot-logo">SINGULAR</div>
  <div class="boot-sub">kişisel evren sistemi</div>
  <div class="boot-card">
    <div class="boot-card-title">Evrenini nerede saklayalım?</div>
    <button class="btn-google" onclick="connectGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google Drive ile bağlan
    </button>
    <button class="btn-local" onclick="connectLocal()">Yerel cihazda sakla</button>
    <div class="boot-note">Google Drive: universe.json Drive'ında güvenli saklanır.<br>Yerel: Veri yalnızca bu tarayıcıda kalır.</div>
    <div class="boot-reconnect" id="boot-reconnect" onclick="reconnectGoogle()">↻ Önceki oturumu sürdür</div>
  </div>
</div>

<div id="universe">
  <canvas id="canvas"></canvas>
  <div id="status"><div class="status-dot" id="status-dot"></div><span id="status-text">bağlanıyor...</span></div>
  <div id="topright"><div id="node-count">0 node</div><div id="zoom-label" style="font-size:.55rem;color:var(--text-dim)">zoom 100%</div></div>
  <div id="hint">Evreni başlatmak için bir şey yaz</div>
  <div id="input-bar">
    <input id="input-field" type="text" placeholder="Bir soru sor, bir şey söyle, bir karar yaz…" autocomplete="off"/>
    <button id="input-send" onclick="handleInput()">→</button>
  </div>
  <div id="zoom-controls">
    <button class="zoom-btn" onclick="zoomBy(1.3)">+</button>
    <button class="zoom-btn" onclick="resetView()">⊙</button>
    <button class="zoom-btn" onclick="zoomBy(0.77)">−</button>
  </div>
  <div id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-badge" class="panel-badge">entry</div>
    <div class="panel-title" id="panel-title">—</div>
    <div class="panel-meta" id="panel-meta">—</div>
    <div id="panel-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const GOOGLE_CLIENT_ID = '557723915441-q49en6uqqkqm9s5fie14ejm6cak9eo6r.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const UNIVERSE_FILENAME = 'universe.json';
const FOLDER_NAME = 'SINGULAR';
const SESSION_KEY = 'singular_session';

// ══════════════════════════════════════
// NODE VISUAL CONFIG
// ══════════════════════════════════════
const TYPE_COLOR = {
  core:     { fill:'rgba(167,139,250,0.15)', stroke:'#a78bfa', dot:'#a78bfa' },
  question: { fill:'rgba(96,165,250,0.1)',   stroke:'#60a5fa', dot:'#60a5fa' },
  answer:   { fill:'rgba(52,211,153,0.08)',  stroke:'#34d399', dot:'#34d399' },
  tag:      { fill:'rgba(245,158,11,0.08)',  stroke:'#f59e0b', dot:'#f59e0b' },
  person:   { fill:'rgba(244,114,182,0.1)',  stroke:'#f472b6', dot:'#f472b6' },
  action:   { fill:'rgba(192,132,252,0.08)', stroke:'#c084fc', dot:'#c084fc' },
  decision: { fill:'rgba(167,139,250,0.15)', stroke:'#a78bfa', dot:'#a78bfa' },
  note:     { fill:'rgba(148,163,184,0.06)', stroke:'#94a3b8', dot:'#94a3b8' }
};
const TYPE_R = { core:28, question:11, answer:10, tag:9, person:12, action:10, decision:10, note:9 };

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const S = {
  mode:null, accessToken:null, tokenExpiry:null,
  driveFileId:null, driveFolderId:null, universe:null,
  nodes:[], links:[],
  // viewport
  scale:1, ox:0, oy:0,
  // interaction
  dragging:false, lastX:0, lastY:0,
  selectedId:null,
  animating:true
};

// ══════════════════════════════════════
// SESSION
// ══════════════════════════════════════
function saveSession() {
  if (S.mode!=='google') return;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({
    mode:S.mode, accessToken:S.accessToken, tokenExpiry:S.tokenExpiry,
    driveFileId:S.driveFileId, driveFolderId:S.driveFolderId
  }));
}
function loadSession() {
  try {
    const d = JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');
    if (!d) return null;
    if (d.tokenExpiry && Date.now()>d.tokenExpiry) { sessionStorage.removeItem(SESSION_KEY); return null; }
    return d;
  } catch { return null; }
}

// ══════════════════════════════════════
// UNIVERSE MODEL
// ══════════════════════════════════════
function createUniverse() {
  return { meta:{version:'0.5',created:new Date().toISOString(),updated:new Date().toISOString()}, profile:{name:null}, entries:[], links:[] };
}
function createEntry(text) {
  const raw = localParse(text);
  return { id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,5), text, created:new Date().toISOString(), raw, status:{saved:false} };
}
function localParse(text) {
  const t = text.trim();
  let type = 'note';
  if (t.endsWith('?')) type='question';
  else if (/^(yap|tamamla|ara|bul|git|al|hatırlat)/i.test(t)) type='action';
  else if (t.startsWith('@')) type='person';
  else if (/^#\w/.test(t)) type='tag';
  else if (/(karar verdim|yapacağım|planım)/i.test(t)) type='decision';
  else type='answer';
  const tags=(t.match(/#[\wğüşıöçĞÜŞİÖÇ]+/g)||[]).map(x=>x.slice(1));
  const mentions=(t.match(/@[\wğüşıöçĞÜŞİÖÇ]+/g)||[]).map(x=>x.slice(1));
  return {type,tags,mentions};
}

// ══════════════════════════════════════
// PHYSICS NODE
// ══════════════════════════════════════
function makeNode(entry, x, y) {
  return {
    id: entry.id,
    entry,
    x: x + (Math.random()-0.5)*40,
    y: y + (Math.random()-0.5)*40,
    vx:0, vy:0,
    r: TYPE_R[entry.raw?.type||'note'] || 10,
    pinned: entry.id === 'core'
  };
}

function addTagRelations(entry) {
  if (!entry.raw.tags.length && !entry.raw.mentions.length) return;
  S.universe.entries.forEach(e => {
    if (e.id === entry.id) return;
    const sharedTags = entry.raw.tags.filter(t => e.raw.tags?.includes(t));
    const sharedM = entry.raw.mentions.filter(m => e.raw.mentions?.includes(m));
    if (sharedTags.length || sharedM.length) {
      const exists = S.universe.links.find(l =>
        (l.from===entry.id&&l.to===e.id)||(l.from===e.id&&l.to===entry.id));
      if (!exists) {
        const link = {from:entry.id, to:e.id, type:'tag', via:[...sharedTags,...sharedM]};
        S.universe.links.push(link);
        S.links.push(link);
      }
    }
  });
}

// ══════════════════════════════════════
// FORCE SIMULATION — minimal, fast
// ══════════════════════════════════════
const FORCE = {
  repulsion: 1800,
  linkDist:  120,
  linkK:     0.04,
  centerK:   0.008,
  damping:   0.82,
  minEnergy: 0.15
};

function tick() {
  const nodes = S.nodes;
  const n = nodes.length;
  if (n < 2) return;

  // Repulsion: O(n²) but fast for <2000 nodes
  for (let i = 0; i < n; i++) {
    const a = nodes[i];
    if (a.pinned) continue;
    for (let j = i+1; j < n; j++) {
      const b = nodes[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      const dist2 = dx*dx + dy*dy || 1;
      if (dist2 > 90000) continue; // skip distant pairs
      const force = FORCE.repulsion / dist2;
      const d = Math.sqrt(dist2);
      dx /= d; dy /= d;
      a.vx += dx*force; a.vy += dy*force;
      if (!b.pinned) { b.vx -= dx*force; b.vy -= dy*force; }
    }
  }

  // Attraction along links
  S.links.forEach(link => {
    const a = S.nodes.find(n=>n.id===link.from);
    const b = S.nodes.find(n=>n.id===link.to);
    if (!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(dist-FORCE.linkDist)*FORCE.linkK;
    const fx=dx/dist*f, fy=dy/dist*f;
    if(!a.pinned){a.vx+=fx;a.vy+=fy;}
    if(!b.pinned){b.vx-=fx;b.vy-=fy;}
  });

  // Core attraction
  const core = nodes.find(n=>n.id==='core');
  const cx = core?.x||0, cy = core?.y||0;
  nodes.forEach(n => {
    if (n.pinned) return;
    n.vx += (cx - n.x) * FORCE.centerK;
    n.vy += (cy - n.y) * FORCE.centerK;
    n.vx *= FORCE.damping;
    n.vy *= FORCE.damping;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// ══════════════════════════════════════
// CANVAS RENDERER
// ══════════════════════════════════════
let canvas, ctx, W, H, raf;
let clusterMap = {}; // tagId → [{x,y}] for cluster centers

function initCanvas() {
  canvas = document.getElementById('canvas');
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx = canvas.getContext('2d');
  S.ox = W/2; S.oy = H/2;
  window.addEventListener('resize', ()=>{
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  });
  setupInteraction();
  loop();
}

function worldToScreen(wx, wy) {
  return { x: (wx)*S.scale + S.ox, y: (wy)*S.scale + S.oy };
}
function screenToWorld(sx, sy) {
  return { x: (sx-S.ox)/S.scale, y: (sy-S.oy)/S.scale };
}

function loop() {
  tick();
  draw();
  raf = requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Background radial
  const grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  grad.addColorStop(0,'rgba(14,8,32,1)');
  grad.addColorStop(1,'rgba(4,4,12,1)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Orbit rings
  const core = S.nodes.find(n=>n.id==='core');
  if (core) {
    const sp = worldToScreen(core.x, core.y);
    [130,230,350,490,680].forEach(r => {
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, r*S.scale, 0, Math.PI*2);
      ctx.strokeStyle='rgba(167,139,250,0.04)';
      ctx.lineWidth=0.5;
      ctx.stroke();
    });

    // Core glow
    const cg = ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,52*S.scale);
    cg.addColorStop(0,'rgba(167,139,250,0.2)');
    cg.addColorStop(1,'rgba(167,139,250,0)');
    ctx.fillStyle=cg;
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,52*S.scale,0,Math.PI*2);
    ctx.fill();

    // Core pulse
    const now = Date.now()/1000;
    const pr = (28 + (now%2)/2 * 30) * S.scale;
    const po = 0.3 - (now%2)/2 * 0.3;
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,pr,0,Math.PI*2);
    ctx.strokeStyle=`rgba(167,139,250,${po})`;
    ctx.lineWidth=0.8;
    ctx.stroke();

    // Core ring
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,28*S.scale,0,Math.PI*2);
    ctx.strokeStyle='rgba(167,139,250,0.4)';
    ctx.lineWidth=0.5;
    ctx.stroke();

    // Core dot
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,4*S.scale,0,Math.PI*2);
    ctx.fillStyle='#a78bfa';
    ctx.fill();
  }

  // Links
  ctx.save();
  S.links.forEach(link => {
    const a=S.nodes.find(n=>n.id===link.from);
    const b=S.nodes.find(n=>n.id===link.to);
    if(!a||!b) return;
    const sa=worldToScreen(a.x,a.y), sb=worldToScreen(b.x,b.y);
    // Frustum cull
    if(sa.x<-100&&sb.x<-100) return;
    if(sa.x>W+100&&sb.x>W+100) return;
    ctx.beginPath();
    ctx.moveTo(sa.x,sa.y);
    ctx.lineTo(sb.x,sb.y);
    if(link.type==='tag') {
      ctx.strokeStyle='rgba(245,158,11,0.18)';
      ctx.setLineDash([3*S.scale,5*S.scale]);
    } else {
      ctx.strokeStyle='rgba(167,139,250,0.08)';
      ctx.setLineDash([]);
    }
    ctx.lineWidth=0.5;
    ctx.stroke();
    ctx.setLineDash([]);
  });
  ctx.restore();

  // Core links (entry → core)
  if (core) {
    const sp=worldToScreen(core.x,core.y);
    S.nodes.forEach(n => {
      if(n.id==='core') return;
      const sn=worldToScreen(n.x,n.y);
      if(sn.x<-100||sn.x>W+100||sn.y<-100||sn.y>H+100) return;
      ctx.beginPath();
      ctx.moveTo(sp.x,sp.y);
      ctx.lineTo(sn.x,sn.y);
      ctx.strokeStyle='rgba(167,139,250,0.06)';
      ctx.lineWidth=0.4;
      ctx.stroke();
    });
  }

  // Clustering: zoom-out shows cluster bubbles
  if (S.scale < 0.5) {
    drawClusters();
    return; // skip individual nodes at very low zoom
  }

  // Nodes
  S.nodes.forEach(n => {
    if(n.id==='core') return;
    const sp=worldToScreen(n.x,n.y);
    // Frustum cull
    if(sp.x<-50||sp.x>W+50||sp.y<-50||sp.y>H+50) return;

    const type=n.entry.raw?.type||'note';
    const col=TYPE_COLOR[type]||TYPE_COLOR.note;
    const r=n.r*S.scale;

    // Node fill
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
    ctx.fillStyle=col.fill;
    ctx.fill();
    ctx.strokeStyle= n.id===S.selectedId ? '#fff' : col.stroke;
    ctx.lineWidth= n.id===S.selectedId ? 1.2 : 0.6;
    ctx.stroke();

    // Decision = diamond overlay
    if(type==='decision') {
      const s=r*0.7;
      ctx.beginPath();
      ctx.moveTo(sp.x,sp.y-s);ctx.lineTo(sp.x+s,sp.y);
      ctx.lineTo(sp.x,sp.y+s);ctx.lineTo(sp.x-s,sp.y);
      ctx.closePath();
      ctx.strokeStyle=col.stroke;ctx.lineWidth=0.5;ctx.stroke();
    }

    // Center dot
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,2.5*Math.min(S.scale,1),0,Math.PI*2);
    ctx.fillStyle=col.dot;ctx.fill();

    // Label — only when zoom allows
    if(S.scale>0.55) {
      const label=n.entry.text;
      const short=label.length>20?label.slice(0,20)+'…':label;
      ctx.font=`${Math.max(8,9*S.scale)}px 'DM Mono',monospace`;
      ctx.fillStyle='rgba(226,224,240,0.5)';
      ctx.textAlign='center';
      ctx.fillText(short, sp.x, sp.y+r+11*Math.min(S.scale,1));
    }
  });

  // Core label
  if(core && S.scale>0.4) {
    const sp=worldToScreen(core.x,core.y);
    ctx.font=`7px 'DM Mono',monospace`;
    ctx.fillStyle='rgba(167,139,250,0.3)';
    ctx.textAlign='center';
    ctx.letterSpacing='4px';
    ctx.fillText('SINGULAR',sp.x,sp.y+44*S.scale);
    ctx.letterSpacing='0px';
  }

  // Zoom label
  document.getElementById('zoom-label').textContent=`zoom ${Math.round(S.scale*100)}%`;
}

function drawClusters() {
  // Group nodes by tag
  const groups = {};
  S.nodes.forEach(n => {
    if(n.id==='core') return;
    const tags=n.entry.raw?.tags||[];
    const key=tags.length?tags[0]:'misc';
    if(!groups[key]) groups[key]=[];
    groups[key].push(n);
  });

  Object.entries(groups).forEach(([key,nodes])=>{
    if(nodes.length<2) return;
    let cx=0,cy=0;
    nodes.forEach(n=>{cx+=n.x;cy+=n.y;});
    cx/=nodes.length;cy/=nodes.length;
    const sp=worldToScreen(cx,cy);
    const r=Math.max(30,nodes.length*8)*S.scale;

    const g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,r);
    g.addColorStop(0,'rgba(96,165,250,0.15)');
    g.addColorStop(1,'rgba(96,165,250,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fill();

    ctx.font=`${Math.max(9,10*S.scale)}px 'DM Mono',monospace`;
    ctx.fillStyle='rgba(96,165,250,0.6)';
    ctx.textAlign='center';
    ctx.fillText(`#${key} (${nodes.length})`,sp.x,sp.y);
  });
}

// ══════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════
function setupInteraction() {
  // Pan
  canvas.addEventListener('mousedown', e=>{
    S.dragging=true; S.lastX=e.clientX; S.lastY=e.clientY;
    canvas.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e=>{
    if(!S.dragging) return;
    S.ox+=e.clientX-S.lastX; S.oy+=e.clientY-S.lastY;
    S.lastX=e.clientX; S.lastY=e.clientY;
  });
  window.addEventListener('mouseup', e=>{
    if(!S.dragging) return;
    const moved=Math.abs(e.clientX-S.lastX)+Math.abs(e.clientY-S.lastY);
    if(moved<3) handleClick(e.clientX,e.clientY);
    S.dragging=false;
    canvas.classList.remove('grabbing');
  });

  // Wheel zoom
  canvas.addEventListener('wheel', e=>{
    e.preventDefault();
    const f=e.deltaY>0?0.88:1.14;
    const wx=(e.clientX-S.ox)/S.scale, wy=(e.clientY-S.oy)/S.scale;
    S.scale=Math.max(0.08,Math.min(6,S.scale*f));
    S.ox=e.clientX-wx*S.scale; S.oy=e.clientY-wy*S.scale;
  },{passive:false});

  // Touch
  let touches={}, pinchDist=0;
  canvas.addEventListener('touchstart',e=>{
    [...e.touches].forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});
    if(e.touches.length===2) {
      const a=e.touches[0],b=e.touches[1];
      pinchDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    } else if(e.touches.length===1) {
      S.dragging=true; S.lastX=e.touches[0].clientX; S.lastY=e.touches[0].clientY;
    }
  });
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2) {
      const a=e.touches[0],b=e.touches[1];
      const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const f=d/pinchDist; pinchDist=d;
      const mx=(a.clientX+b.clientX)/2, my=(a.clientY+b.clientY)/2;
      const wx=(mx-S.ox)/S.scale, wy=(my-S.oy)/S.scale;
      S.scale=Math.max(0.08,Math.min(6,S.scale*f));
      S.ox=mx-wx*S.scale; S.oy=my-wy*S.scale;
    } else if(e.touches.length===1&&S.dragging) {
      S.ox+=e.touches[0].clientX-S.lastX; S.oy+=e.touches[0].clientY-S.lastY;
      S.lastX=e.touches[0].clientX; S.lastY=e.touches[0].clientY;
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(e.changedTouches.length===1&&e.touches.length===0) {
      const t=e.changedTouches[0];
      const prev=touches[t.identifier];
      if(prev&&Math.abs(t.clientX-prev.x)+Math.abs(t.clientY-prev.y)<10) handleClick(t.clientX,t.clientY);
    }
    S.dragging=false; touches={};
  });
}

function handleClick(sx,sy) {
  const w=screenToWorld(sx,sy);
  let hit=null, minD=Infinity;
  S.nodes.forEach(n=>{
    const d=Math.hypot(n.x-w.x,n.y-w.y);
    if(d<(n.r+8)/S.scale && d<minD) { minD=d; hit=n; }
  });
  if(hit) { S.selectedId=hit.id; openPanel(hit.entry); }
  else { S.selectedId=null; closePanel(); }
}

function zoomBy(f) {
  const wx=(W/2-S.ox)/S.scale, wy=(H/2-S.oy)/S.scale;
  S.scale=Math.max(0.08,Math.min(6,S.scale*f));
  S.ox=W/2-wx*S.scale; S.oy=H/2-wy*S.scale;
}
function resetView() { S.scale=1; S.ox=W/2; S.oy=H/2; }

// ══════════════════════════════════════
// GOOGLE DRIVE
// ══════════════════════════════════════
function connectGoogle() {
  if(!window.google){alert('Google Identity Services yüklenemedi.');return;}
  google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID, scope:DRIVE_SCOPE,
    callback:async(resp)=>{
      if(resp.error) return;
      S.accessToken=resp.access_token;
      S.tokenExpiry=Date.now()+(resp.expires_in*1000)-60000;
      S.mode='google';
      await initDrive(); saveSession(); launchUniverse('Google Drive');
    }
  }).requestAccessToken();
}
async function reconnectGoogle() {
  const session=loadSession();
  if(!session){connectGoogle();return;}
  Object.assign(S,{accessToken:session.accessToken,tokenExpiry:session.tokenExpiry,driveFileId:session.driveFileId,driveFolderId:session.driveFolderId,mode:'google'});
  try { S.universe=await loadFile(S.driveFileId); launchUniverse('Google Drive'); }
  catch { sessionStorage.removeItem(SESSION_KEY); connectGoogle(); }
}
async function initDrive() {
  let fid=await findFolder(); if(!fid) fid=await createFolder();
  S.driveFolderId=fid;
  let fileId=await findFile(fid);
  if(!fileId){S.universe=createUniverse();fileId=await createFile(fid);}
  else{S.driveFileId=fileId;S.universe=await loadFile(fileId);}
  S.driveFileId=fileId;
}
async function dReq(url,opts={}) {
  const r=await fetch(url,{...opts,headers:{'Authorization':'Bearer '+S.accessToken,'Content-Type':'application/json',...(opts.headers||{})}});
  return r.json();
}
async function findFolder(){const d=await dReq(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&fields=files(id)`);return d.files?.[0]?.id||null;}
async function createFolder(){const d=await dReq('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})});return d.id;}
async function findFile(fid){const d=await dReq(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${UNIVERSE_FILENAME}' and '${fid}' in parents and trashed=false`)}&fields=files(id)`);return d.files?.[0]?.id||null;}
async function createFile(fid){
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:UNIVERSE_FILENAME,parents:[fid]})],{type:'application/json'}));
  form.append('file',new Blob([JSON.stringify(S.universe,null,2)],{type:'application/json'}));
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{'Authorization':'Bearer '+S.accessToken},body:form});
  return (await r.json()).id;
}
async function loadFile(id){const r=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+S.accessToken}});return r.json();}
async function saveUniverse(){
  S.universe.meta.updated=new Date().toISOString();
  if(S.mode==='local'){localStorage.setItem('singular_universe',JSON.stringify(S.universe));return;}
  if(!S.driveFileId||!S.accessToken) return;
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${S.driveFileId}?uploadType=media`,{method:'PATCH',headers:{'Authorization':'Bearer '+S.accessToken,'Content-Type':'application/json'},body:JSON.stringify(S.universe,null,2)});
}

// ══════════════════════════════════════
// LOCAL MODE
// ══════════════════════════════════════
function connectLocal(){
  S.mode='local';
  const saved=localStorage.getItem('singular_universe');
  S.universe=saved?JSON.parse(saved):createUniverse();
  launchUniverse('Yerel');
}

// ══════════════════════════════════════
// LAUNCH
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  if(loadSession()) document.getElementById('boot-reconnect').style.display='block';
});

function launchUniverse(label) {
  const boot=document.getElementById('boot');
  boot.classList.add('fade-out');
  setTimeout(()=>{
    boot.style.display='none';
    document.getElementById('universe').classList.add('active');
    document.getElementById('status-dot').classList.add('connected');
    document.getElementById('status-text').textContent=label;
    initCanvas();
    buildGraph();
    document.getElementById('input-field').addEventListener('keydown',e=>{if(e.key==='Enter')handleInput();});
    document.getElementById('input-field').focus();
  },800);
}

function buildGraph() {
  // Core node
  const coreEntry={id:'core',text:'SINGULAR',raw:{type:'core',tags:[],mentions:[]},created:S.universe.meta.created};
  S.nodes.push(makeNode(coreEntry,0,0));
  S.nodes[0].pinned=true;
  S.nodes[0].x=0; S.nodes[0].y=0;

  // Existing entries
  S.universe.entries.forEach(e=>addEntryNode(e,false));

  // Existing links
  S.links=[...S.universe.links];

  updateNodeCount();
}

function addEntryNode(entry, animate=true) {
  const angle=Math.random()*Math.PI*2;
  const dist=120+Math.random()*200;
  const node=makeNode(entry,Math.cos(angle)*dist,Math.sin(angle)*dist);
  S.nodes.push(node);
  if(animate && S.nodes.length>1) {
    document.getElementById('hint').style.opacity='0';
  }
  updateNodeCount();
  return node;
}

function updateNodeCount(){
  document.getElementById('node-count').textContent=(S.nodes.length-1)+' node';
}

// ══════════════════════════════════════
// INPUT
// ══════════════════════════════════════
async function handleInput(){
  const f=document.getElementById('input-field');
  const text=f.value.trim();
  if(!text) return;
  f.value='';

  const entry=createEntry(text);
  S.universe.entries.push(entry);
  addEntryNode(entry);
  addTagRelations(entry);
  entry.status.saved=true;
  saveUniverse();
  saveSession();
}

// ══════════════════════════════════════
// PANEL
// ══════════════════════════════════════
function openPanel(entry) {
  if(!entry||entry.id==='core') {
    document.getElementById('panel-badge').textContent='evren';
    document.getElementById('panel-badge').style.cssText='background:rgba(167,139,250,.12);color:#a78bfa';
    document.getElementById('panel-title').textContent='SINGULAR — Senin Evrenin';
    document.getElementById('panel-meta').textContent=S.universe?.meta?.created?new Date(S.universe.meta.created).toLocaleString('tr-TR'):'';
    document.getElementById('panel-body').innerHTML=`<div style="font-size:.66rem;color:var(--text-muted);line-height:1.8">${S.nodes.length-1} kayıt · ${S.links.length} bağlantı</div>`;
    document.getElementById('panel').classList.add('open');
    return;
  }

  const type=entry.raw?.type||'note';
  const col=TYPE_COLOR[type]||TYPE_COLOR.note;
  const badge=document.getElementById('panel-badge');
  badge.textContent=type;
  badge.style.cssText=`background:${col.fill};color:${col.stroke};`;

  document.getElementById('panel-title').textContent=entry.text||'—';
  document.getElementById('panel-meta').textContent=entry.created?new Date(entry.created).toLocaleString('tr-TR'):'—';

  const body=document.getElementById('panel-body');
  body.innerHTML='';

  const tags=entry.raw?.tags||[];
  if(tags.length){
    const sec=document.createElement('div');sec.className='panel-section';
    const lbl=document.createElement('div');lbl.className='panel-section-label';lbl.textContent='Etiketler';
    const row=document.createElement('div');row.className='panel-tags';
    tags.forEach(t=>{const s=document.createElement('span');s.className='panel-tag';s.textContent='#'+t;row.appendChild(s);});
    sec.appendChild(lbl);sec.appendChild(row);body.appendChild(sec);
  }

  const mentions=entry.raw?.mentions||[];
  if(mentions.length) body.appendChild(psec('Kişiler',mentions.map(m=>'@'+m).join(' · ')));

  // Related via links
  const related=S.universe.links
    .filter(l=>l.from===entry.id||l.to===entry.id)
    .map(l=>{
      const rid=l.from===entry.id?l.to:l.from;
      const re=S.universe.entries.find(e=>e.id===rid);
      return re?{entry:re,via:l.via}:null;
    }).filter(Boolean);

  if(related.length){
    const sec=document.createElement('div');sec.className='panel-section';
    const lbl=document.createElement('div');lbl.className='panel-section-label';lbl.textContent='İlişkili kayıtlar';
    const list=document.createElement('div');list.className='panel-relations';
    related.forEach(r=>{
      const btn=document.createElement('div');btn.className='panel-rel';
      const viaStr=r.via?.length?' · '+r.via.map(v=>'#'+v).join(' '):'';
      btn.textContent=(r.entry.text.length>38?r.entry.text.slice(0,38)+'…':r.entry.text)+viaStr;
      btn.onclick=()=>{
        S.selectedId=r.entry.id;
        const n=S.nodes.find(nd=>nd.id===r.entry.id);
        if(n){const sp=worldToScreen(n.x,n.y);S.ox+=W/2-sp.x;S.oy+=H/2-sp.y;}
        openPanel(r.entry);
      };
      list.appendChild(btn);
    });
    sec.appendChild(lbl);sec.appendChild(list);body.appendChild(sec);
  }

  document.getElementById('panel').classList.add('open');
}

function psec(label,text){
  const s=document.createElement('div');s.className='panel-section';
  const l=document.createElement('div');l.className='panel-section-label';l.textContent=label;
  const b=document.createElement('div');b.className='panel-section-body';b.textContent=text;
  s.appendChild(l);s.appendChild(b);return s;
}
function closePanel(){document.getElementById('panel').classList.remove('open');S.selectedId=null;}
</script>
