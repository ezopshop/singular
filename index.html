<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGULAR</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap');
:root {
  --bg:#080810;--bg2:#0e0e1a;
  --core:#a78bfa;--core-glow:rgba(167,139,250,0.15);
  --text:#e2e0f0;--text-muted:#6b6880;--text-dim:#3a3850;
  --border:rgba(167,139,250,0.12);--border-bright:rgba(167,139,250,0.3);
  --q:#60a5fa;--a:#34d399;--t:#f59e0b;--p:#f472b6;--act:#c084fc;
  --panel:rgba(14,14,26,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100vh;overflow:hidden;}
#boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;transition:opacity .8s ease,transform .8s ease;}
#boot.fade-out{opacity:0;transform:scale(1.04);pointer-events:none;}
.boot-logo{font-family:'DM Serif Display',serif;font-size:3.5rem;letter-spacing:.3em;opacity:.9;margin-bottom:.25rem;}
.boot-sub{font-size:.6rem;letter-spacing:.4em;color:var(--text-muted);text-transform:uppercase;margin-bottom:3.5rem;}
.boot-card{background:var(--bg2);border:.5px solid var(--border-bright);border-radius:12px;padding:2rem 2.5rem;width:340px;text-align:center;}
.boot-card-title{font-size:.65rem;letter-spacing:.25em;color:var(--text-muted);text-transform:uppercase;margin-bottom:1.5rem;}
.btn-google{width:100%;padding:.85rem 1.25rem;background:transparent;border:.5px solid var(--border-bright);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:background .2s,border-color .2s;margin-bottom:.75rem;}
.btn-google:hover{background:rgba(167,139,250,.07);border-color:var(--core);}
.btn-google svg{width:16px;height:16px;flex-shrink:0;}
.btn-local{width:100%;padding:.7rem 1.25rem;background:transparent;border:.5px solid var(--text-dim);border-radius:8px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;cursor:pointer;transition:color .2s,border-color .2s;}
.btn-local:hover{color:var(--text);border-color:var(--text-muted);}
.boot-note{font-size:.6rem;color:var(--text-dim);margin-top:1.25rem;line-height:1.7;}
#universe{position:fixed;inset:0;opacity:0;transition:opacity 1s ease;pointer-events:none;}
#universe.active{opacity:1;pointer-events:all;}
#cosmos{position:absolute;inset:0;width:100%;height:100%;}
.orbit-ring{fill:none;stroke:rgba(167,139,250,.04);stroke-width:.5;}
.core-outer{fill:none;stroke:var(--core);stroke-width:.5;opacity:.4;}
.core-inner{fill:var(--core-glow);}
.core-dot{fill:var(--core);}
.core-pulse{fill:none;stroke:var(--core);stroke-width:.5;opacity:0;}
.g-node{cursor:pointer;}
.g-node circle{stroke-width:.5;}
.g-node text{font-family:'DM Mono',monospace;font-size:9px;fill:rgba(226,224,240,.55);pointer-events:none;}
.g-link{fill:none;stroke-width:.5;}
.g-link.core-link{stroke:rgba(167,139,250,.12);}
.g-link.semantic-link{stroke:rgba(52,211,153,.25);stroke-dasharray:3,3;}
.enrich-dot{fill:#f59e0b;opacity:0;}
.enrich-dot.pending{opacity:1;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:.8;}50%{opacity:.2;}}
#input-bar{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);width:min(600px,92vw);display:flex;align-items:center;background:var(--bg2);border:.5px solid var(--border-bright);border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(167,139,250,.08);}
#input-field{flex:1;padding:1rem 1.25rem;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.03em;}
#input-field::placeholder{color:var(--text-muted);}
#input-send{padding:.75rem 1.25rem;background:transparent;border:none;border-left:.5px solid var(--border);color:var(--core);cursor:pointer;font-size:1rem;transition:background .2s;}
#input-send:hover{background:var(--core-glow);}
#hint{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);font-size:.62rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;transition:opacity .5s;white-space:nowrap;pointer-events:none;}
#suggestions{position:fixed;bottom:6.5rem;left:50%;transform:translateX(-50%);width:min(600px,92vw);display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;opacity:0;transition:opacity .4s;}
#suggestions.visible{opacity:1;}
.sug-btn{font-size:.62rem;padding:.3rem .7rem;background:transparent;border:.5px solid var(--border);border-radius:20px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;transition:color .2s,border-color .2s,background .2s;}
.sug-btn:hover{color:var(--text);border-color:var(--core);background:rgba(167,139,250,.06);}
#status{position:fixed;top:1.5rem;left:1.5rem;display:flex;align-items:center;gap:.5rem;font-size:.6rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background .3s;}
.status-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399;}
#topright{position:fixed;top:1.5rem;right:1.5rem;text-align:right;font-size:.6rem;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;line-height:1.8;}
#enrich-status{font-size:.55rem;color:var(--t);opacity:0;transition:opacity .3s;}
#enrich-status.active{opacity:1;}
#panel{position:fixed;top:50%;right:-380px;transform:translateY(-50%);width:340px;max-height:75vh;background:var(--panel);border:.5px solid var(--border-bright);border-radius:12px;padding:1.5rem;transition:right .4s cubic-bezier(.16,1,.3,1);overflow-y:auto;z-index:50;}
#panel.open{right:1.5rem;}
.panel-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:.9rem;font-family:'DM Mono',monospace;}
.panel-close:hover{color:var(--text);}
.panel-badge{display:inline-block;font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;padding:.25rem .6rem;border-radius:4px;margin-bottom:.75rem;}
.badge-question{background:rgba(96,165,250,.12);color:var(--q);}
.badge-answer{background:rgba(52,211,153,.12);color:var(--a);}
.badge-tag{background:rgba(245,158,11,.12);color:var(--t);}
.badge-person{background:rgba(244,114,182,.12);color:var(--p);}
.badge-action{background:rgba(192,132,252,.12);color:var(--act);}
.badge-decision{background:rgba(167,139,250,.15);color:var(--core);}
.badge-core,.badge-note{background:rgba(148,163,184,.1);color:#94a3b8;}
.panel-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);margin-bottom:.75rem;line-height:1.5;}
.panel-meta{font-size:.58rem;color:var(--text-dim);margin-bottom:1rem;}
.panel-section{margin-bottom:1rem;}
.panel-section-label{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem;}
.panel-section-body{font-size:.68rem;color:var(--text-muted);line-height:1.7;white-space:pre-line;}
.panel-tags{display:flex;flex-wrap:wrap;gap:.35rem;}
.panel-tag{font-size:.58rem;padding:.2rem .55rem;border:.5px solid var(--border-bright);border-radius:4px;color:var(--core);}
.panel-questions{display:flex;flex-direction:column;gap:.4rem;}
.panel-q-btn{font-size:.62rem;padding:.35rem .7rem;background:transparent;border:.5px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-family:'DM Mono',monospace;text-align:left;transition:color .2s,border-color .2s;}
.panel-q-btn:hover{color:var(--text);border-color:var(--core);}
.panel-enriching{font-size:.62rem;color:var(--t);animation:blink 1.2s infinite;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="boot">
  <div class="boot-logo">SINGULAR</div>
  <div class="boot-sub">kişisel evren sistemi</div>
  <div class="boot-card">
    <div class="boot-card-title">Evrenini nerede saklayalım?</div>
    <button class="btn-google" onclick="connectGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google Drive ile bağlan
    </button>
    <button class="btn-local" onclick="connectLocal()">Yerel cihazda sakla</button>
    <div class="boot-note">Google Drive: universe.json Drive'ında güvenli saklanır.<br>Yerel: Veri yalnızca bu tarayıcıda kalır.</div>
  </div>
</div>

<div id="universe">
  <svg id="cosmos"></svg>
  <div id="status"><div class="status-dot" id="status-dot"></div><span id="status-text">bağlanıyor...</span></div>
  <div id="topright"><div id="node-count">0 node</div><div id="enrich-status">⬡ zenginleştiriliyor...</div></div>
  <div id="hint">Evreni başlatmak için bir şey yaz</div>
  <div id="suggestions"></div>
  <div id="input-bar">
    <input id="input-field" type="text" placeholder="Bir soru sor, bir şey söyle, bir karar yaz…" autocomplete="off"/>
    <button id="input-send" onclick="handleInput()">→</button>
  </div>
  <div id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panel-badge" class="panel-badge badge-note">entry</div>
    <div class="panel-title" id="panel-title">—</div>
    <div class="panel-meta" id="panel-meta">—</div>
    <div id="panel-body"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────
const GOOGLE_CLIENT_ID = '557723915441-q49en6uqqkqm9s5fie14ejm6cak9eo6r.apps.googleusercontent.com';
const WORKER_URL = 'https://broad-limit-fea7.ezopshop.workers.dev';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const UNIVERSE_FILENAME = 'universe.json';
const FOLDER_NAME = 'SINGULAR';

// ── STATE ───────────────────────────────────────
const S = {
  mode:null, accessToken:null, driveFileId:null, driveFolderId:null,
  universe:null, graphNodes:[], enrichQueue:[], enrichRunning:false
};

// ── UNIVERSE MODEL ──────────────────────────────
function createUniverse() {
  return {
    meta:{ version:'0.3', created:new Date().toISOString(), updated:new Date().toISOString() },
    profile:{ name:null }, entries:[], people:[], projects:[], tags:[], links:[]
  };
}

function createEntry(text) {
  const raw = localParse(text);
  return {
    id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    text, created:new Date().toISOString(),
    raw:{ type:raw.type, tags:raw.tags },
    semantic:{ intent:null, entities:[], summary:null, related_to:[], suggested_next_questions:[], suggested_actions:[], confidence:0 },
    status:{ saved:false, semantic_enriched:false }
  };
}

// ── LAYER 1: LOCAL PARSER ───────────────────────
function localParse(text) {
  const t = text.trim();
  let type = 'note';
  if (t.endsWith('?')) type = 'question';
  else if (/^(yap|tamamla|ara|bul|git|al|ver|dene|karar)/i.test(t)) type = 'action';
  else if (t.startsWith('@')) type = 'person';
  else if (/#/.test(t)) type = 'tag';
  else if (/(karar verdim|yapacağım|planım|hedefim)/i.test(t)) type = 'decision';
  else type = 'answer';
  const tags = (t.match(/#[\wğüşıöçĞÜŞİÖÇ]+/g)||[]).map(x=>x.slice(1));
  return { type, tags };
}

// ── LAYER 2: GEMINI ENRICHMENT ──────────────────
async function enrichEntry(entry) {
  const ctx = S.universe.entries
    .filter(e=>e.id!==entry.id&&e.status.semantic_enriched)
    .map(e=>`[${e.id}]: ${e.text}`).slice(-15).join('\n');

  const prompt = `Sen bir kişisel bilgi yönetim sisteminin anlam motorusun. SADECE JSON döndür.

Mevcut kayıtlar:
${ctx||'(henüz yok)'}

Yeni giriş: "${entry.text}"
Ham tip: ${entry.raw.type}

{"intent":"kullanıcı ne yapmak istiyor (Türkçe)","entities":["varlıklar"],"summary":"max 8 kelime özet","related_to":["ilişkili ID'ler"],"suggested_next_questions":["2-3 Türkçe soru"],"suggested_actions":["max 2 aksiyon"],"confidence":0.85}`;

  try {
    document.getElementById('enrich-status').classList.add('active');
    const res = await fetch(`${WORKER_URL}/gemini`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.3,maxOutputTokens:800} })
    });
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    entry.semantic = {
      intent:parsed.intent||null, entities:parsed.entities||[], summary:parsed.summary||null,
      related_to:parsed.related_to||[], suggested_next_questions:parsed.suggested_next_questions||[],
      suggested_actions:parsed.suggested_actions||[], confidence:parsed.confidence||0
    };
    entry.status.semantic_enriched = true;

    drawSemanticLinks(entry);
    updateNodeLabel(entry);
    setEnrichDot(entry.id, false);

    const panel = document.getElementById('panel');
    if (panel.classList.contains('open') && document.getElementById('panel-title').dataset.entryId===entry.id) renderPanel(entry);

    showSuggestions(entry.semantic.suggested_next_questions);
    saveUniverse();
  } catch(e) {
    console.warn('Enrichment failed:', e);
  } finally {
    document.getElementById('enrich-status').classList.remove('active');
  }
}

async function runEnrichQueue() {
  if (S.enrichRunning||!S.enrichQueue.length) return;
  S.enrichRunning = true;
  while (S.enrichQueue.length) {
    const id = S.enrichQueue.shift();
    const e = S.universe.entries.find(x=>x.id===id);
    if (e&&!e.status.semantic_enriched) await enrichEntry(e);
  }
  S.enrichRunning = false;
}

// ── GOOGLE DRIVE ────────────────────────────────
function connectGoogle() {
  if (!window.google) { alert('Google yüklenemedi.'); return; }
  google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID, scope:DRIVE_SCOPE,
    callback: async(resp) => {
      if (resp.error) return;
      S.accessToken = resp.access_token; S.mode = 'google';
      await initDrive(); launchUniverse('Google Drive');
    }
  }).requestAccessToken();
}

async function initDrive() {
  let fid = await findFolder(); if (!fid) fid = await createFolder();
  S.driveFolderId = fid;
  let fileId = await findFile(fid);
  if (!fileId) { S.universe = createUniverse(); fileId = await createFile(fid); }
  else { S.driveFileId = fileId; S.universe = await loadFile(fileId); }
  S.driveFileId = fileId;
}

async function dReq(url,opts={}) {
  const r = await fetch(url,{...opts,headers:{'Authorization':'Bearer '+S.accessToken,'Content-Type':'application/json',...(opts.headers||{})}});
  return r.json();
}
async function findFolder() {
  const d = await dReq(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&fields=files(id)`);
  return d.files?.[0]?.id||null;
}
async function createFolder() {
  const d = await dReq('https://www.googleapis.com/drive/v3/files',{method:'POST',body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})});
  return d.id;
}
async function findFile(fid) {
  const d = await dReq(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${UNIVERSE_FILENAME}' and '${fid}' in parents and trashed=false`)}&fields=files(id)`);
  return d.files?.[0]?.id||null;
}
async function createFile(fid) {
  const form = new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:UNIVERSE_FILENAME,parents:[fid]})],{type:'application/json'}));
  form.append('file',new Blob([JSON.stringify(S.universe,null,2)],{type:'application/json'}));
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{'Authorization':'Bearer '+S.accessToken},body:form});
  return (await r.json()).id;
}
async function loadFile(id) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{'Authorization':'Bearer '+S.accessToken}});
  return r.json();
}
async function saveUniverse() {
  S.universe.meta.updated = new Date().toISOString();
  if (S.mode==='local') { localStorage.setItem('singular_universe',JSON.stringify(S.universe)); return; }
  if (!S.driveFileId||!S.accessToken) return;
  await fetch(`https://www.googleapis.com/upload/drive/v3/files/${S.driveFileId}?uploadType=media`,{
    method:'PATCH',headers:{'Authorization':'Bearer '+S.accessToken,'Content-Type':'application/json'},
    body:JSON.stringify(S.universe,null,2)
  });
}

// ── LOCAL MODE ──────────────────────────────────
function connectLocal() {
  S.mode = 'local';
  const saved = localStorage.getItem('singular_universe');
  S.universe = saved ? JSON.parse(saved) : createUniverse();
  launchUniverse('Yerel');
}

// ── LAUNCH ──────────────────────────────────────
function launchUniverse(label) {
  const boot = document.getElementById('boot');
  boot.classList.add('fade-out');
  setTimeout(() => {
    boot.style.display = 'none';
    document.getElementById('universe').classList.add('active');
    document.getElementById('status-dot').classList.add('connected');
    document.getElementById('status-text').textContent = label;
    initCosmos();
    renderExistingEntries();
    document.getElementById('input-field').addEventListener('keydown',e=>{if(e.key==='Enter')handleInput();});
    document.getElementById('input-field').focus();
  }, 800);
}

// ── COSMOS ──────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
let svgEl,cx,cy;
const NSTYLE={
  question:{fill:'rgba(96,165,250,.15)',stroke:'#60a5fa'},
  answer:{fill:'rgba(52,211,153,.12)',stroke:'#34d399'},
  tag:{fill:'rgba(245,158,11,.12)',stroke:'#f59e0b'},
  person:{fill:'rgba(244,114,182,.12)',stroke:'#f472b6'},
  action:{fill:'rgba(192,132,252,.12)',stroke:'#c084fc'},
  decision:{fill:'rgba(167,139,250,.18)',stroke:'#a78bfa'},
  note:{fill:'rgba(148,163,184,.1)',stroke:'#94a3b8'}
};
function mk(tag){return document.createElementNS(NS,tag);}

function initCosmos() {
  svgEl=document.getElementById('cosmos');
  cx=window.innerWidth/2; cy=window.innerHeight/2;
  drawOrbits(); drawCore(); animCore();
  window.addEventListener('resize',()=>{cx=window.innerWidth/2;cy=window.innerHeight/2;svgEl.innerHTML='';drawOrbits();drawCore();animCore();rerenderAll();});
}
function drawOrbits(){[130,230,350,490].forEach(r=>{const c=mk('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('class','orbit-ring');svgEl.appendChild(c);});}
function drawCore(){
  const g=mk('g');g.id='core-g';
  [[52,'core-inner'],[30,'core-outer'],[4,'core-dot']].forEach(([r,cls])=>{const c=mk('circle');c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('class',cls);g.appendChild(c);});
  const p=mk('circle');p.setAttribute('cx',cx);p.setAttribute('cy',cy);p.setAttribute('r','30');p.setAttribute('class','core-pulse');p.id='pulse-ring';g.appendChild(p);
  const t=mk('text');t.setAttribute('x',cx);t.setAttribute('y',cy+46);t.setAttribute('text-anchor','middle');t.setAttribute('fill','rgba(167,139,250,.35)');t.setAttribute('font-size','8');t.setAttribute('font-family','DM Mono,monospace');t.setAttribute('letter-spacing','3');t.textContent='SINGULAR';g.appendChild(t);
  g.style.cursor='pointer';g.onclick=()=>openPanelRaw({type:'core',text:'Senin evreninin merkezi.',created:S.universe?.meta?.created});
  svgEl.appendChild(g);
}
function animCore(){
  const r=document.getElementById('pulse-ring');if(!r)return;
  let rv=30,op=0.5;
  (function s(){rv+=0.25;op-=0.006;if(rv>65){rv=30;op=0.5;}r.setAttribute('r',rv);r.setAttribute('opacity',op);requestAnimationFrame(s);})();
}
function getPos(i,total,orbit){const a=(i/Math.max(total,1))*2*Math.PI-Math.PI/2;return{x:cx+orbit*Math.cos(a),y:cy+orbit*Math.sin(a)};}
function orbitFor(n){if(n<=6)return 150;if(n<=14)return 250;if(n<=26)return 370;return 500;}

function addNodeToGraph(entry) {
  const total=S.graphNodes.length+1;
  const pos=getPos(S.graphNodes.length,total,orbitFor(total));
  S.graphNodes.push({id:entry.id,x:pos.x,y:pos.y,entry});
  const st=NSTYLE[entry.raw?.type]||NSTYLE.note;
  const g=mk('g');g.setAttribute('class','g-node');g.setAttribute('data-id',entry.id);g.style.opacity='0';

  const link=mk('line');link.setAttribute('x1',cx);link.setAttribute('y1',cy);link.setAttribute('x2',pos.x);link.setAttribute('y2',pos.y);link.setAttribute('class','g-link core-link');link.setAttribute('data-link-id',entry.id);
  svgEl.insertBefore(link,svgEl.children[4]||null);

  const c=mk('circle');c.setAttribute('cx',pos.x);c.setAttribute('cy',pos.y);c.setAttribute('r','11');c.setAttribute('fill',st.fill);c.setAttribute('stroke',st.stroke);g.appendChild(c);
  const d=mk('circle');d.setAttribute('cx',pos.x);d.setAttribute('cy',pos.y);d.setAttribute('r','3');d.setAttribute('fill',st.stroke);g.appendChild(d);
  const ed=mk('circle');ed.setAttribute('cx',pos.x+9);ed.setAttribute('cy',pos.y-9);ed.setAttribute('r','3');ed.setAttribute('class','enrich-dot');ed.setAttribute('data-enrich',entry.id);
  if(!entry.status?.semantic_enriched)ed.classList.add('pending');g.appendChild(ed);
  const lbl=mk('text');lbl.setAttribute('x',pos.x);lbl.setAttribute('y',pos.y+22);lbl.setAttribute('text-anchor','middle');lbl.setAttribute('data-label',entry.id);
  const sh=entry.semantic?.summary||entry.text;lbl.textContent=sh.length>16?sh.slice(0,16)+'…':sh;g.appendChild(lbl);

  g.onclick=()=>openPanelEntry(entry.id);
  svgEl.appendChild(g);
  requestAnimationFrame(()=>{g.style.transition='opacity .6s';g.style.opacity='1';});
  document.getElementById('node-count').textContent=S.graphNodes.length+' node';
  if(S.graphNodes.length===1)document.getElementById('hint').style.opacity='0';
}

function updateNodeLabel(entry){
  const l=svgEl.querySelector(`[data-label="${entry.id}"]`);
  if(!l)return;const s=entry.semantic?.summary||entry.text;l.textContent=s.length>16?s.slice(0,16)+'…':s;
}
function setEnrichDot(id,pending){const d=svgEl.querySelector(`[data-enrich="${id}"]`);if(d)d.classList.toggle('pending',pending);}
function drawSemanticLinks(entry){
  if(!entry.semantic?.related_to?.length)return;
  const fn=S.graphNodes.find(n=>n.id===entry.id);if(!fn)return;
  entry.semantic.related_to.forEach(rid=>{
    const tn=S.graphNodes.find(n=>n.id===rid);if(!tn)return;
    const l=mk('line');l.setAttribute('x1',fn.x);l.setAttribute('y1',fn.y);l.setAttribute('x2',tn.x);l.setAttribute('y2',tn.y);l.setAttribute('class','g-link semantic-link');
    svgEl.insertBefore(l,svgEl.children[4]||null);
    S.universe.links.push({from:entry.id,to:rid,type:'semantic'});
  });
}
function rerenderAll(){
  document.querySelectorAll('.g-node,[data-link-id],.semantic-link').forEach(e=>e.remove());
  const s=[...S.graphNodes];S.graphNodes=[];
  s.forEach(n=>addNodeToGraph(n.entry));
  s.filter(n=>n.entry.status?.semantic_enriched).forEach(n=>drawSemanticLinks(n.entry));
}
function renderExistingEntries(){
  if(!S.universe?.entries)return;
  S.universe.entries.forEach(e=>addNodeToGraph(e));
  S.universe.entries.filter(e=>e.status?.semantic_enriched).forEach(e=>drawSemanticLinks(e));
}

// ── INPUT ───────────────────────────────────────
async function handleInput(){
  const f=document.getElementById('input-field');
  const text=f.value.trim();if(!text)return;
  f.value='';hideSuggestions();
  const entry=createEntry(text);
  S.universe.entries.push(entry);
  addNodeToGraph(entry);
  entry.status.saved=true;
  saveUniverse();
  S.enrichQueue.push(entry.id);
  runEnrichQueue();
}

// ── SUGGESTIONS ─────────────────────────────────
function showSuggestions(qs){
  if(!qs?.length)return;
  const el=document.getElementById('suggestions');el.innerHTML='';
  qs.slice(0,3).forEach(q=>{
    const b=document.createElement('button');b.className='sug-btn';b.textContent=q;
    b.onclick=()=>{document.getElementById('input-field').value=q;document.getElementById('input-field').focus();hideSuggestions();};
    el.appendChild(b);
  });
  el.classList.add('visible');
}
function hideSuggestions(){document.getElementById('suggestions').classList.remove('visible');}

// ── PANEL ───────────────────────────────────────
function openPanelEntry(id){const e=S.universe.entries.find(x=>x.id===id);if(e)renderPanel(e);}
function openPanelRaw(obj){renderPanel(obj);}
function renderPanel(entry){
  const type=entry.raw?.type||entry.type||'note';
  const badge=document.getElementById('panel-badge');badge.textContent=type;badge.className='panel-badge badge-'+type;
  const title=document.getElementById('panel-title');title.textContent=entry.text||'—';title.dataset.entryId=entry.id||'';
  document.getElementById('panel-meta').textContent=entry.created?new Date(entry.created).toLocaleString('tr-TR'):'—';
  const body=document.getElementById('panel-body');body.innerHTML='';

  if(entry.id&&!entry.status?.semantic_enriched){const el=document.createElement('div');el.className='panel-enriching';el.textContent='⬡ Anlam katmanı yükleniyor...';body.appendChild(el);}
  if(entry.semantic?.intent)body.appendChild(ps('Niyet',entry.semantic.intent));
  if(entry.semantic?.summary)body.appendChild(ps('Özet',entry.semantic.summary));
  if(entry.semantic?.entities?.length)body.appendChild(ps('Varlıklar',entry.semantic.entities.join(' · ')));

  const tags=entry.raw?.tags||[];
  if(tags.length){
    const sec=document.createElement('div');sec.className='panel-section';
    const lbl=document.createElement('div');lbl.className='panel-section-label';lbl.textContent='Etiketler';
    const row=document.createElement('div');row.className='panel-tags';
    tags.forEach(t=>{const s=document.createElement('span');s.className='panel-tag';s.textContent='#'+t;row.appendChild(s);});
    sec.appendChild(lbl);sec.appendChild(row);body.appendChild(sec);
  }
  if(entry.semantic?.suggested_next_questions?.length){
    const sec=document.createElement('div');sec.className='panel-section';
    const lbl=document.createElement('div');lbl.className='panel-section-label';lbl.textContent='Önerilen sorular';
    const ql=document.createElement('div');ql.className='panel-questions';
    entry.semantic.suggested_next_questions.forEach(q=>{
      const b=document.createElement('button');b.className='panel-q-btn';b.textContent=q;
      b.onclick=()=>{document.getElementById('input-field').value=q;document.getElementById('input-field').focus();closePanel();};
      ql.appendChild(b);
    });
    sec.appendChild(lbl);sec.appendChild(ql);body.appendChild(sec);
  }
  if(entry.semantic?.suggested_actions?.length)body.appendChild(ps('Önerilen aksiyonlar',entry.semantic.suggested_actions.join('\n')));
  document.getElementById('panel').classList.add('open');
}
function ps(label,text){
  const s=document.createElement('div');s.className='panel-section';
  const l=document.createElement('div');l.className='panel-section-label';l.textContent=label;
  const b=document.createElement('div');b.className='panel-section-body';b.textContent=text;
  s.appendChild(l);s.appendChild(b);return s;
}
function closePanel(){document.getElementById('panel').classList.remove('open');}
</script>
</body>
